server {
    listen 80;
    server_name localhost;
    server_tokens off;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers (applied to every response) ─────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;

    # Content Security Policy — adjust script-src/connect-src if you add
    # third-party scripts (Hotjar, Crisp, Calendly, etc.).
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self' mailto:; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com; media-src 'self'; object-src 'none'; manifest-src 'self';" always;

    # ─── Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── HTML pages — no cache (SSG means fresh on every deploy) ──────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Root index served as HTML too
    location = / {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }

    # ─── Hashed Astro assets — cache 1 year (filenames are content-hashed)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # ─── Other static media — cache 30 days ───────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform" always;
        access_log off;
    }

    # ─── llms.txt / robots.txt / sitemaps — no cache, explicit utf-8 ───────
    location ~* ^/(llms\.txt|robots\.txt|sitemap[-\w]*\.xml)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # ─── Routing — Astro emits /path/index.html, so clean URLs work ───────
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # ─── Real 404 (fixes soft-404 from the previous SPA build) ────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ─── 5xx fallbacks ────────────────────────────────────────────────────
    error_page 500 502 503 504 /404.html;
}
