version: '3.8'
services:
  portfolio:
    build: .
    container_name: portfolio_app
    restart: always
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      # Routeur principal HTTPS (non-www uniquement)
      - "traefik.http.routers.portfolio.rule=Host(`rodespe.com`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls.certresolver=mytlschallenge"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"
      # Routeur www → redirect 301 vers non-www
      - "traefik.http.routers.portfolio-www.rule=Host(`www.rodespe.com`)"
      - "traefik.http.routers.portfolio-www.entrypoints=websecure"
      - "traefik.http.routers.portfolio-www.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.portfolio-www.middlewares=redirect-www-to-nonwww"
      - "traefik.http.middlewares.redirect-www-to-nonwww.redirectregex.regex=^https://www\\.rodespe\\.com/(.*)"
      - "traefik.http.middlewares.redirect-www-to-nonwww.redirectregex.replacement=https://rodespe.com/$${1}"
      - "traefik.http.middlewares.redirect-www-to-nonwww.redirectregex.permanent=true"
      # Redirection HTTP → HTTPS
      - "traefik.http.routers.portfolio-http.rule=Host(`rodespe.com`) || Host(`www.rodespe.com`)"
      - "traefik.http.routers.portfolio-http.entrypoints=web"
      - "traefik.http.routers.portfolio-http.middlewares=portfolio-redirect-to-https"
      - "traefik.http.middlewares.portfolio-redirect-to-https.redirectscheme.scheme=https"
networks:
  traefik_public:
    external: true
